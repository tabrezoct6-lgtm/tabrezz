<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.6);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }

    header h1 {
      color: #ff4c60;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff4c60;
    }

    .hero {
      height: 100vh;
      background: url('https://wallpaperaccess.com/full/39619.jpg') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 60px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .section {
      padding: 80px 50px;
    }

    .section h2 {
      margin-bottom: 20px;
      color: #ff4c60;
    }

    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card h3 {
      padding: 10px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
    }
  </style>
</head>
<body>

<header>
  <h1>ShonenShelf</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Popular</a>
    <a href="#">Genres</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to Anime World ✨</h2>
</section>

<section class="section">
  <h2>🔥 Trending Anime</h2>
  <div class="anime-grid">

    <div class="card">
      <img src="https://cdn.myanimelist.net/images/anime/10/47347.jpg" alt="">
      <h3>Attack on Titan</h3>
    </div>

    <div class="card">
      <img src="https://cdn.myanimelist.net/images/anime/1208/94745.jpg" alt="">
      <h3>Naruto</h3>
    </div>

    <div class="card">
      <img src="https://cdn.myanimelist.net/images/anime/1764/126627.jpg" alt="">
      <h3>Jujutsu Kaisen</h3>
    </div>

    <div class="card">
      <img src="https://cdn.myanimelist.net/images/anime/1337/99013.jpg" alt="">
      <h3>Demon Slayer</h3>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Anime Home | Made with ❤️</p>
</footer>

</body>
</html>
